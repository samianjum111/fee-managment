
<!-- Voucher Generation Modal -->
<div id="voucherModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3 id="voucherModalTitle">Generate Fee Voucher</h3>
            <button class="close-modal" onclick="closeVoucherModal()">&times;</button>
        </div>
        <div id="voucherModalBody">
            <!-- Content loaded via JS -->
        </div>
    </div>
</div>

<!-- Voucher Display Modal -->
<div id="voucherDisplayModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
            <h3>Fee Voucher</h3>
            <div class="voucher-actions">
                <button class="btn-secondary" id="printVoucherBtn">Print</button>
                <button class="btn-secondary" id="downloadVoucherBtn">Save</button>
                <button class="btn-secondary" id="editVoucherBtn" style="display:none;">Edit</button>
                <button class="close-modal" onclick="closeVoucherDisplay()">&times;</button>
            </div>
        </div>
        <div id="voucherDisplayBody">
            <!-- Receipt content loaded via JS -->
        </div>
    </div>
</div>

<style>
    .voucher-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
    }
    .voucher-actions .btn-secondary {
        padding: 0.25rem 0.8rem;
        font-size: 0.8rem;
    }
    .voucher-receipt {
        padding: 1rem;
        background: var(--surface-alt);
        border-radius: 0.5rem;
        font-size: 0.9rem;
        line-height: 1.5;
    }
    .voucher-receipt .receipt-header {
        display: flex;
        justify-content: space-between;
        border-bottom: 2px solid var(--primary);
        padding-bottom: 0.5rem;
        margin-bottom: 1rem;
    }
    .voucher-receipt .receipt-header .school-name {
        font-size: 1.2rem;
        font-weight: 700;
    }
    .voucher-receipt .receipt-header .receipt-no {
        font-family: monospace;
        color: var(--muted);
    }
    .voucher-receipt .student-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        background: var(--surface);
        padding: 0.5rem;
        border-radius: 0.3rem;
        margin-bottom: 1rem;
    }
    .voucher-receipt .fee-details table {
        width: 100%;
        border-collapse: collapse;
        margin: 0.5rem 0;
    }
    .voucher-receipt .fee-details th, .voucher-receipt .fee-details td {
        padding: 0.5rem;
        border-bottom: 1px solid var(--border);
        text-align: left;
    }
    .voucher-receipt .fee-details th {
        background: var(--surface-alt);
        font-weight: 600;
    }
    .voucher-receipt .total-row {
        font-weight: 700;
        border-top: 2px solid var(--border);
    }
    .voucher-receipt .pending-note {
        margin-top: 1rem;
        padding: 0.5rem;
        background: #fef3c7;
        color: #92400e;
        border-radius: 0.3rem;
        font-size: 0.85rem;
    }
    .charge-item {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 0.5rem;
    }
    .charge-item input[type="text"], .charge-item input[type="number"] {
        flex: 1;
        padding: 0.3rem;
        border-radius: 0.3rem;
        border: 1px solid var(--border);
    }
    .charge-item .remove-charge {
        background: none;
        border: none;
        color: var(--danger);
        cursor: pointer;
        font-size: 1.2rem;
    }
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 0.5rem;
        margin-top: 1rem;
    }
</style>

<script>
// --- Voucher JS ---
function getCsrfToken() {
    let name = 'csrftoken';
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

const voucherModal = document.getElementById('voucherModal');
const voucherDisplayModal = document.getElementById('voucherDisplayModal');
const voucherModalBody = document.getElementById('voucherModalBody');
const voucherDisplayBody = document.getElementById('voucherDisplayBody');
const voucherModalTitle = document.getElementById('voucherModalTitle');

let currentStudentId = null;
let currentSchema = null;

function openVoucherModal(studentId, schema) {
    currentStudentId = studentId;
    currentSchema = schema;
    voucherModal.style.display = 'flex';
    // Load status
    loadVoucherStatus(studentId, schema);
}

function loadVoucherStatus(studentId, schema) {
    fetch(`/portal/${schema}/api/student/${studentId}/voucher-status/`)
        .then(res => res.json())
        .then(data => {
            if (data.error) {
                alert('Error: ' + data.error);
                closeVoucherModal();
                return;
            }
            if (data.exists && !data.can_edit) {
                // Scenario 3: paid, show voucher only
                showVoucherDisplay(data, schema, studentId);
                closeVoucherModal();
            } else if (data.exists && data.can_edit) {
                // Scenario 2: exists and unpaid, show edit form
                showVoucherForm(data, true);
            } else {
                // Scenario 1: not exists, show create form
                showVoucherForm(data, false);
            }
        })
        .catch(err => {
            alert('Error loading voucher status: ' + err.message);
            closeVoucherModal();
        });
}

function showVoucherForm(data, isEdit) {
    voucherModalTitle.innerText = isEdit ? 'Edit Fee Voucher' : 'Generate Fee Voucher';
    let html = `<div class="voucher-form">`;
    html += `<p><strong>Student:</strong> ${data.student_name} (${data.student_roll})</p>`;
    html += `<p><strong>Grade:</strong> ${data.grade} - ${data.section}</p>`;
    html += `<div class="form-field"><label>Fee Amount (₹)</label><input type="number" step="0.01" id="voucherFeeAmount" value="${data.amount || data.default_fee}" placeholder="Default: ${data.default_fee}"></div>`;
    html += `<div class="form-field"><label>Additional Charges</label><div id="chargesContainer">`;
    // Combine default charges and existing extra charges
    let charges = data.extra_charges || [];
    if (data.default_charges && data.default_charges.length > 0 && !isEdit) {
        // For new, pre-fill with default charges
        charges = data.default_charges;
    }
    if (charges.length === 0) {
        charges = [{title: '', amount: ''}];
    }
    charges.forEach((ch, idx) => {
        html += `<div class="charge-item" data-index="${idx}">
            <input type="text" class="charge-title" value="${ch.title || ''}" placeholder="Title">
            <input type="number" step="0.01" class="charge-amount" value="${ch.amount || ''}" placeholder="Amount">
            <button type="button" class="remove-charge" onclick="removeCharge(this)">&times;</button>
        </div>`;
    });
    html += `<button type="button" class="btn-secondary" onclick="addCharge()">+ Add Charge</button>`;
    html += `</div></div>`;
    // Pending fees summary
    html += `<div class="form-field"><strong>Total Pending (including this fee):</strong> ₹<span id="voucherTotalPending">${data.total_pending}</span></div>`;
    html += `<div class="form-field"><label><input type="checkbox" id="saveDefaultCharges"> Save these charges as defaults for future manual generations</label></div>`;
    html += `<div class="form-actions">
        <button type="button" class="btn-secondary" onclick="closeVoucherModal()">Cancel</button>
        <button type="button" class="btn-primary" id="voucherSubmitBtn">${isEdit ? 'Update' : 'Generate'}</button>
    </div>`;
    html += `</div>`;
    voucherModalBody.innerHTML = html;

    // Attach event to submit button
    document.getElementById('voucherSubmitBtn').addEventListener('click', function() {
        submitVoucher(currentStudentId, currentSchema, isEdit);
    });
}

function addCharge() {
    const container = document.getElementById('chargesContainer');
    const idx = container.querySelectorAll('.charge-item').length;
    const div = document.createElement('div');
    div.className = 'charge-item';
    div.dataset.index = idx;
    div.innerHTML = `
        <input type="text" class="charge-title" placeholder="Title">
        <input type="number" step="0.01" class="charge-amount" placeholder="Amount">
        <button type="button" class="remove-charge" onclick="removeCharge(this)">&times;</button>
    `;
    container.insertBefore(div, container.lastElementChild); // before the add button
}

function removeCharge(btn) {
    const item = btn.closest('.charge-item');
    if (item) item.remove();
}

function getChargesFromForm() {
    const items = document.querySelectorAll('.charge-item');
    const charges = [];
    items.forEach(item => {
        const title = item.querySelector('.charge-title').value.trim();
        const amount = item.querySelector('.charge-amount').value.trim();
        if (title || amount) {
            charges.push({ title: title || 'Unnamed', amount: parseFloat(amount) || 0 });
        }
    });
    return charges;
}

function submitVoucher(studentId, schema, isEdit) {
    const amount = document.getElementById('voucherFeeAmount').value;
    const charges = getChargesFromForm();
    const saveDefault = document.getElementById('saveDefaultCharges').checked;
    const payload = {
        custom_amount: amount ? parseFloat(amount) : null,
        charges: charges,
        save_default_charges: saveDefault
    };
    const url = isEdit
        ? `/portal/${schema}/api/student/${studentId}/update-voucher/`
        : `/portal/${schema}/api/student/${studentId}/generate-voucher/`;
    fetch(url, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCsrfToken()
        },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert('Error: ' + data.error);
            return;
        }
        if (data.success) {
            // Show voucher
            showVoucherDisplay(data.voucher, schema, studentId);
            closeVoucherModal();
            // Optionally reload page to update fee records
            // location.reload(); // maybe
        } else {
            alert('Unexpected response');
        }
    })
    .catch(err => {
        alert('Error: ' + err.message);
    });
}

function showVoucherDisplay(voucherData, schema, studentId) {
    // Build receipt HTML
    let html = `<div class="voucher-receipt" id="voucherReceipt">`;
    html += `<div class="receipt-header">
        <div class="school-name">{{ tenant.name }}</div>
        <div class="receipt-no">Voucher #${voucherData.receipt_number}</div>
    </div>`;
    html += `<div class="student-info">
        <div><strong>Student:</strong> ${voucherData.student_name}</div>
        <div><strong>Roll:</strong> ${voucherData.student_roll}</div>
        <div><strong>Grade:</strong> ${voucherData.grade} - ${voucherData.section}</div>
        <div><strong>Month:</strong> ${voucherData.month}/${voucherData.year}</div>
    </div>`;
    html += `<div class="fee-details"><table>
        <thead><tr><th>Description</th><th>Amount (₹)</th></tr></thead>
        <tbody>`;
    html += `<tr><td>Monthly Fee</td><td>${voucherData.fee_amount.toFixed(2)}</td></tr>`;
    if (voucherData.charges && voucherData.charges.length) {
        voucherData.charges.forEach(ch => {
            html += `<tr><td>${ch.title}</td><td>${ch.amount.toFixed(2)}</td></tr>`;
        });
    }
    const total = voucherData.fee_amount + voucherData.charges.reduce((sum, ch) => sum + ch.amount, 0);
    html += `<tr class="total-row"><td><strong>Total</strong></td><td><strong>${total.toFixed(2)}</strong></td></tr>`;
    html += `</tbody></table></div>`;
    if (voucherData.total_pending > 0) {
        html += `<div class="pending-note">⚠️ Total pending (including previous months): ₹${voucherData.total_pending.toFixed(2)}</div>`;
    }
    html += `<div style="margin-top:1rem; font-size:0.8rem; color:var(--muted);">Generated on: ${voucherData.generated_on} | Due: ${voucherData.due_date}</div>`;
    html += `</div>`;

    voucherDisplayBody.innerHTML = html;
    // Show edit button if can_edit (we passed from previous step)
    // We'll check if the fee is unpaid by looking at the data? We'll need to fetch status again.
    // For simplicity, we'll check if there is a fee record with paid_amount = 0.
    // We can pass a flag from the API. We'll adjust later.
    // For now, we'll hide edit by default; we'll enable it if we know it's editable.
    const editBtn = document.getElementById('editVoucherBtn');
    // We'll set this based on can_edit from the status call.
    // We'll store a flag in the modal data.
    voucherDisplayModal.dataset.canEdit = 'false';
    // We'll set it to true if the fee was unpaid.
    // We'll modify the showVoucherDisplay call to pass canEdit.
    editBtn.style.display = 'none';
    voucherDisplayModal.style.display = 'flex';
}

function closeVoucherModal() {
    voucherModal.style.display = 'none';
}

function closeVoucherDisplay() {
    voucherDisplayModal.style.display = 'none';
}

// Print voucher
document.getElementById('printVoucherBtn')?.addEventListener('click', function() {
    const content = document.getElementById('voucherReceipt');
    const win = window.open('', '', 'width=800,height=600');
    win.document.write('<html><head><title>Voucher</title><style>body { font-family: sans-serif; padding: 2rem; }</style></head><body>');
    win.document.write(content.innerHTML);
    win.document.write('</body></html>');
    win.document.close();
    win.print();
});

// Download voucher as image (using html2canvas)
document.getElementById('downloadVoucherBtn')?.addEventListener('click', function() {
    const element = document.getElementById('voucherReceipt');
    if (!element) return;
    // Load html2canvas if not loaded
    if (typeof html2canvas === 'undefined') {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
        script.onload = function() { downloadVoucherImage(element); };
        document.head.appendChild(script);
    } else {
        downloadVoucherImage(element);
    }
});

function downloadVoucherImage(element) {
    html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'voucher.png';
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>
