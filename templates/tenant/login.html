<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ tenant.name }} Login</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; background: #0b1220; color: #e2e8f0; }
        .login-card { width: min(420px, 100%); background: #111827; border: 1px solid #1f2937; border-radius: 20px; padding: 36px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35); }
        h1 { margin: 0 0 12px; color: #38bdf8; }
        p { margin: 0 0 24px; color: #94a3b8; }
        label { display: block; margin-bottom: 6px; color: #cbd5e1; }
        input { width: 100%; padding: 12px 14px; margin-bottom: 18px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.12); }
        button { width: 100%; padding: 14px 0; border: none; border-radius: 12px; background: #38bdf8; color: #0f172a; font-weight: 700; cursor: pointer; }
        .message { margin-bottom: 16px; padding: 12px 14px; border-radius: 12px; background: #111827; color: #f8fafc; }
        .meta { margin-top: 18px; color: #94a3b8; font-size: 0.92rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>{{ tenant.name }} Portal</h1>
        <p>Login with the school credentials provided by the super admin.</p>

        {% if error %}
            <div class="message">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'school_portal_login' schema_name=tenant.schema_name %}">
            {% csrf_token %}
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button type="submit">Login</button>
        </form>

        <div class="meta">If you are a super admin, use the public admin portal at <strong>/admin/</strong>.</div>
    </div>
</body>
</html>
