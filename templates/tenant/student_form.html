<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Induction Wizard | AXIS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .form-card { background: #1e293b; max-width: 750px; margin: 40px auto; padding: 35px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { color: #38bdf8; margin-top: 0; text-align: center; font-size: 1.6rem; border-bottom: 2px solid #334155; padding-bottom: 15px; }
        .section-title { color: #34d399; font-size: 1.1rem; margin: 25px 0 15px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; color: #94a3b8; font-weight: 500; font-size: 0.9rem; }
        label.required::after { content: " *"; color: #ef4444; }
        input, select, textarea { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #fff; box-sizing: border-box; font-size: 0.95rem; }
        input:focus, select:focus, textarea:focus { border-color: #38bdf8; outline: none; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .btn-container { display: flex; gap: 15px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1em; text-align: center; text-decoration: none; }
        .btn-submit { background: #38bdf8; color: #0f172a; border: none; }
        .btn-submit:hover { background: #7dd3fc; }
        .btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #334155; }
        .btn-cancel:hover { background: #334155; color: #fff; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Student Induction Wizard</h2>
        <form method="POST">
            {% csrf_token %}
            
            <div class="section-title">Core Mandated Records (Required)</div>
            <div class="grid-container">
                <div class="form-group">
                    <label class="required">Student Name</label>
                    <input type="text" name="name" required placeholder="Full Legal Name">
                </div>
                <div class="form-group">
                    <label class="required">Father Name</label>
                    <input type="text" name="father_name" required placeholder="Father's Full Name">
                </div>
                <div class="form-group">
                    <label class="required">Father CNIC</label>
                    <input type="text" name="father_cnic" required placeholder="35202-XXXXXXX-X">
                </div>
                <div class="form-group">
                    <label class="required">Parent Mobile Number</label>
                    <input type="text" name="parent_mobile" required placeholder="e.g. 03001234567">
                </div>
                <div class="form-group">
                    <label class="required">Class / Grade</label>
                    <input type="text" name="grade" required placeholder="e.g. 10th Class">
                </div>
                <div class="form-group">
                    <label class="required">Section</label>
                    <input type="text" name="section" required placeholder="e.g. Jinnah-A">
                </div>
                <div class="form-group">
                    <label class="required">Admission Date</label>
                    <input type="date" name="admission_date" required>
                </div>
                <div class="form-group">
                    <label class="required">Operational Status</label>
                    <select name="status" required>
                        <option value="active" selected>Active Enrolled</option>
                        <option value="suspended">Suspended</option>
                        <option value="struck_off">Struck Off</option>
                        <option value="graduated">Graduated</option>
                    </select>
                </div>
            </div>

            <div class="section-title">Demographic Records (Optional Context)</div>
            <div class="grid-container">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="" selected>---------</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="date_of_birth">
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>Residential Address</label>
                <textarea name="address" rows="2" placeholder="Full permanent physical address"></textarea>
            </div>

            <div class="section-title">Internal Archival Notes</div>
            <div class="form-group">
                <label>Administrative Notes</label>
                <textarea name="notes" rows="2" placeholder="Any specific remarks, medical history or concessions..."></textarea>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn btn-submit">Commit Profile to Tenant Ledger</button>
                <a href="{% url 'school_home' %}" class="btn btn-cancel">Abort & Return</a>
            </div>
        </form>
    </div>
</body>
</html>
